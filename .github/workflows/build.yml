name: Build and Release

on:
  push:
    # branches: [ "main" ]
    # tags:
    #   - 'v*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  android:
    name: Android Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Prepare Android Signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 secret missing; skipping signing setup."
            exit 0
          fi
          printf "%s" "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release-key.jks
          cat <<EOF > android/key.properties
          storeFile=app/release-key.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF
          chmod 600 android/app/release-key.jks android/key.properties
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Get Dependencies
        run: flutter pub get
        
      - name: Build Universal APK
        run: flutter build apk --release
        
      - name: Rename Universal APK
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/KikoFlu-android-universe-release.apk
        
      - name: Build Split APKs
        run: flutter build apk --release --split-per-abi
        
      - name: Rename Split APKs
        run: |
          mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk build/app/outputs/flutter-apk/KikoFlu-android-arm64-v8a-release.apk
          mv build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk build/app/outputs/flutter-apk/KikoFlu-android-armeabi-v7a-release.apk
          mv build/app/outputs/flutter-apk/app-x86_64-release.apk build/app/outputs/flutter-apk/KikoFlu-android-x86_64-release.apk
          
      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: android-release
          path: |
            build/app/outputs/flutter-apk/KikoFlu-android-universe-release.apk
            build/app/outputs/flutter-apk/KikoFlu-android-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/KikoFlu-android-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/KikoFlu-android-x86_64-release.apk

  windows:
    name: Windows Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Get Dependencies
        run: flutter pub get
        
      - name: Build Windows Release
        run: flutter build windows --release

      - name: Install Inno Setup
        run: |
          choco install innosetup --no-progress
          echo "C:\Program Files (x86)\Inno Setup 6" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Get Version from Pubspec
        id: get_version
        shell: pwsh
        run: |
          $content = Get-Content pubspec.yaml -Raw
          if ($content -match "version:\s*([0-9]+\.[0-9]+\.[0-9]+)") {
            $version = $matches[1]
            echo "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host "Found version: $version"
          } else {
            Write-Error "Could not find version in pubspec.yaml"
            exit 1
          }

      - name: Build Installer
        run: iscc /DMyAppVersion="${{ steps.get_version.outputs.VERSION }}" installer_script.iss

      - name: Create Zip
        uses: thedoctor0/zip-release@0.7.6
        with:
          type: 'zip'
          filename: 'KikoFlu-windows.zip'
          directory: 'build/windows/x64/runner/Release'

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: windows-release
          path: |
            build/windows/x64/runner/Release/KikoFlu-windows.zip
            Output/KikoFlu-windows-setup.exe

  ios:
    name: iOS Build (Unsigned)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Get Dependencies
        run: flutter pub get
        
      - name: Install Pods
        run: |
          cd ios
          pod install
          
      - name: Build iOS Archive (Unsigned)
        run: |
          cd ios
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/Runner.xcarchive \
            -arch arm64 \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            PROVISIONING_PROFILE="" \
            ONLY_ACTIVE_ARCH=NO
            
      - name: Package IPA
        run: |
          mkdir -p build/Payload
          cp -r ios/build/Runner.xcarchive/Products/Applications/Runner.app build/Payload/
          cd build
          zip -qr KikoFlu-ios-unsigned.ipa Payload
          
      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v6
        with:
          name: ios-unsigned-release
          path: build/KikoFlu-ios-unsigned.ipa

  macos:
    name: macOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Get Dependencies
        run: flutter pub get
        
      - name: Build macOS Release
        run: flutter build macos --release
        
      - name: Create DMG
        run: |
          mkdir -p build/dmg
          cp -R build/macos/Build/Products/Release/KikoFlu.app build/dmg/
          hdiutil create -volname "KikoFlu" \
            -srcfolder build/dmg \
            -ov -format UDZO \
            KikoFlu-macos.dmg
            
      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v6
        with:
          name: macos-release
          path: KikoFlu-macos.dmg

  linux:
    name: Linux Build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev \
            libmpv-dev \
            libsqlite3-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get Dependencies
        run: flutter pub get

      - name: Build Linux Release
        run: flutter build linux --release

      - name: Create Archive
        run: |
          cd build/linux/x64/release/bundle
          tar -czf "$GITHUB_WORKSPACE/KikoFlu-linux-x64.tar.gz" .

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v6
        with:
          name: linux-release
          path: KikoFlu-linux-x64.tar.gz

  update-altsource:
    name: Update AltStore Source
    runs-on: ubuntu-latest
    needs: [ios]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Download iOS Artifact
        uses: actions/download-artifact@v6
        with:
          name: ios-unsigned-release
          path: ./ios-artifact

      - name: Update app.json
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: *//' | tr -d '[:space:]')
          TAG="${GITHUB_REF#refs/tags/}"
          DATE=$(date -u +"%Y-%m-%d")
          IPA_SIZE=$(stat -c%s ./ios-artifact/KikoFlu-ios-unsigned.ipa 2>/dev/null || stat -f%z ./ios-artifact/KikoFlu-ios-unsigned.ipa)
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/KikoFlu-ios-unsigned.ipa"

          # Use python for reliable JSON manipulation
          python3 << 'EOF'
          import json, os

          version = os.environ.get("VERSION", "0.0.0")
          date = os.environ.get("DATE", "2026-01-01")
          size = int(os.environ.get("IPA_SIZE", "0"))
          download_url = os.environ.get("DOWNLOAD_URL", "")

          with open("app.json", "r", encoding="utf-8") as f:
              source = json.load(f)

          app = source["apps"][0]

          # Check if this version already exists
          existing_versions = [v["version"] for v in app["versions"]]
          new_version = {
              "version": version,
              "buildVersion": "1",
              "date": date,
              "localizedDescription": f"Release {version}",
              "downloadURL": download_url,
              "size": size,
              "minOSVersion": "13.0"
          }

          if version in existing_versions:
              # Update existing entry
              for i, v in enumerate(app["versions"]):
                  if v["version"] == version:
                      # Preserve localizedDescription if manually set
                      new_version["localizedDescription"] = v.get("localizedDescription", new_version["localizedDescription"])
                      app["versions"][i] = new_version
                      break
          else:
              # Insert at beginning (latest first)
              app["versions"].insert(0, new_version)

          with open("app.json", "w", encoding="utf-8") as f:
              json.dump(source, f, indent=2, ensure_ascii=False)
              f.write("\n")

          print(f"Updated app.json: version={version}, size={size}, url={download_url}")
          EOF

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update AltStore source for ${GITHUB_REF#refs/tags/}"
          git push
